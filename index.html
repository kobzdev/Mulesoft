<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>10 Projects to Become a Developer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #070b0f;
    --surface: #0d1117;
    --surface2: #111820;
    --border: #1c2a38;
    --border2: #243040;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --accent3: #ff6b35;
    --text: #c9d8e8;
    --text-dim: #4a6a85;
    --text-muted: #2a3f52;
    --beginner: #22c55e;
    --intermediate: #f59e0b;
    --advanced: #ef4444;
    --code-bg: #050810;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid bg */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    padding: 24px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    background: rgba(7,11,15,0.9);
    backdrop-filter: blur(8px);
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-tag {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .logo-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #e8f4ff;
    letter-spacing: -0.5px;
  }

  .logo-title span { color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    position: relative;
    z-index: 10;
    padding: 12px 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: rgba(7,11,15,0.7);
  }

  .filter-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 5px 16px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-dim);
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
  .filter-btn.beginner.active { background: var(--beginner); border-color: var(--beginner); }
  .filter-btn.intermediate.active { background: var(--intermediate); border-color: var(--intermediate); }
  .filter-btn.advanced.active { background: var(--advanced); border-color: var(--advanced); }

  /* ── LAYOUT ── */
  .layout {
    position: relative;
    z-index: 10;
    display: flex;
    min-height: calc(100vh - 120px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 270px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .nav-item {
    padding: 11px 18px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.12s;
    position: relative;
  }

  .nav-item:hover { background: rgba(0,212,170,0.04); }

  .nav-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }

  .nav-item.hidden { display: none; }

  .nav-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .nav-num {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    min-width: 20px;
  }

  .nav-badge {
    font-size: 8px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .nav-title {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.3;
    font-weight: 400;
    padding-left: 28px;
  }

  .nav-item.active .nav-title { color: var(--text); font-weight: 600; }

  .nav-cat {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 2px;
    padding-left: 28px;
  }

  /* ── MAIN PANEL ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 36px 44px;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Project header */
  .proj-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .proj-number {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: var(--surface2);
    line-height: 1;
    margin-right: 16px;
    user-select: none;
  }

  .proj-title-block {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .proj-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #e8f4ff;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .proj-cat {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .proj-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    padding: 5px 14px;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    border: 1px solid;
  }

  .time-badge {
    font-size: 10px;
    padding: 5px 14px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border2);
    letter-spacing: 0.5px;
  }

  /* Description card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 16px;
    animation: fadeIn 0.25s ease;
  }

  .card-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .desc-text {
    font-size: 13px;
    line-height: 1.8;
    color: #8aadcc;
  }

  /* Why card */
  .why-card {
    background: rgba(0,212,170,0.05);
    border: 1px solid rgba(0,212,170,0.15);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: fadeIn 0.3s ease;
  }

  .why-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

  .why-label {
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .why-text {
    font-size: 12px;
    color: #a0c8b8;
    line-height: 1.7;
  }

  /* Skills grid */
  .skills-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .skill-tag {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 11px;
    color: #7090aa;
    letter-spacing: 0.3px;
    transition: all 0.12s;
  }

  .skill-tag:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Two-col */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
    .proj-number { font-size: 48px; }
    .main { padding: 24px 20px; }
    .sidebar { width: 220px; }
    header { padding: 16px 20px; }
    .filter-bar { padding: 10px 20px; }
  }

  /* Endpoint */
  .endpoint-box {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
    word-break: break-all;
  }

  /* Code block */
  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .code-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .code-dots {
    display: flex;
    gap: 5px;
  }

  .code-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .code-lang {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }

  .code-content {
    padding: 18px 20px;
    font-size: 12px;
    line-height: 1.9;
    color: #7dd3a8;
    font-family: 'JetBrains Mono', monospace;
    white-space: pre;
    overflow-x: auto;
  }

  .code-content::-webkit-scrollbar { height: 4px; }
  .code-content::-webkit-scrollbar-thumb { background: var(--border2); }

  /* Nav footer */
  .nav-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  .nav-btn {
    padding: 9px 22px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .nav-btn.prev {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border2);
  }

  .nav-btn.prev:hover:not(:disabled) {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .nav-btn.next {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-weight: 700;
  }

  .nav-btn.next:hover:not(:disabled) {
    background: #00f0c0;
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .nav-counter {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
  }

  /* Tooltip for difficulty */
  .diff-beginner { color: var(--beginner); border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.08); }
  .diff-intermediate { color: var(--intermediate); border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.08); }
  .diff-advanced { color: var(--advanced); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.08); }

  /* empty state */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    animation: fadeIn 0.2s ease;
  }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<header>
  <div class="logo-area">
    <div class="logo-tag">// dev roadmap</div>
    <div class="logo-title">10 Projects to <span>Level Up</span></div>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-num">3</div><div class="stat-label">Beginner</div></div>
    <div class="stat"><div class="stat-num">4</div><div class="stat-label">Intermediate</div></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-label">Advanced</div></div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">filter:</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn beginner" data-filter="beginner" onclick="setFilter('beginner', this)">Beginner</button>
  <button class="filter-btn intermediate" data-filter="intermediate" onclick="setFilter('intermediate', this)">Intermediate</button>
  <button class="filter-btn advanced" data-filter="advanced", onclick="setFilter('advanced', this)">Advanced</button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="mainPanel"></div>
</div>

<script>
const projects = [
  {
    num: "01",
    title: "Personal Portfolio API",
    category: "MuleSoft / REST",
    difficulty: "beginner",
    time: "1–2 days",
    description: "Build a MuleSoft API that serves your portfolio data — skills, projects, and experience — as clean JSON. A React or HTML frontend fetches from it. You'll go through the full lifecycle: design a RAML spec, build the Mule flow, transform data with DataWeave, and deploy to CloudHub.",
    why: "Every developer needs a portfolio. Building the API behind it forces you to learn the full MuleSoft deploy cycle from scratch — spec, flow, transform, deploy.",
    skills: ["HTTP Listener", "DataWeave", "CloudHub Deploy", "RAML Design", "Set Payload"],
    endpoint: "GET /portfolio/projects\nGET /portfolio/skills\nGET /portfolio/contact",
    lang: "DataWeave",
    code: `%dw 2.0\noutput application/json\n---\n{\n  name: "Kobi",\n  role: "MuleSoft Developer",\n  skills: ["MuleSoft","Node.js","React","Python"],\n  projects: payload map (p) -> {\n    id: p.id,\n    name: p.name,\n    stack: p.stack,\n    liveUrl: p.url\n  }\n}`
  },
  {
    num: "02",
    title: "Todo List Full Stack",
    category: "React + Node.js / Express",
    difficulty: "beginner",
    time: "2–3 days",
    description: "Classic CRUD app — Create, Read, Update, Delete todos. Build a React frontend with hooks and a Node.js/Express backend. Use SQLite or a JSON file for persistence. Add filtering by status (done / pending) and sorting by date.",
    why: "CRUD is the foundation of 90% of real-world apps. Master this once and every future app — dashboards, trackers, portals — becomes structurally familiar.",
    skills: ["React useState/useEffect", "Express REST API", "CRUD Operations", "Fetch/Axios", "SQLite"],
    endpoint: "GET /todos\nPOST /todos\nPUT /todos/:id\nDELETE /todos/:id",
    lang: "JavaScript (Node.js)",
    code: `const express = require('express');\nconst app = express();\n\napp.get('/todos', (req, res) => {\n  res.json(db.getAll());\n});\n\napp.post('/todos', (req, res) => {\n  const todo = { id: Date.now(), ...req.body, done: false };\n  db.insert(todo);\n  res.status(201).json(todo);\n});\n\napp.put('/todos/:id', (req, res) => {\n  const updated = db.update(req.params.id, req.body);\n  res.json(updated);\n});`
  },
  {
    num: "03",
    title: "Weather Proxy Dashboard",
    category: "API Integration / MuleSoft",
    difficulty: "beginner",
    time: "1–2 days",
    description: "Call the OpenWeatherMap API from a MuleSoft flow or Node.js backend. Shape the response with DataWeave, expose a clean endpoint, and display temp/humidity/forecast on a React dashboard with basic charts. Practice handling external API errors gracefully.",
    why: "Real-world APIs are messy and unpredictable. This teaches you to parse foreign response shapes, handle failures, and present clean data — the core of integration work.",
    skills: ["HTTP Request Connector", "Query Parameters", "DataWeave Transform", "Error Handling", "React Charts"],
    endpoint: "GET /weather/{city}\nGET /weather/{city}/forecast",
    lang: "DataWeave",
    code: `%dw 2.0\noutput application/json\n---\n{\n  city: payload.name,\n  country: payload.sys.country,\n  temperature: payload.main.temp,\n  feelsLike: payload.main.feels_like,\n  humidity: payload.main.humidity ++ "%",\n  description: payload.weather[0].description,\n  icon: "https://openweathermap.org/img/w/"\n    ++ payload.weather[0].icon ++ ".png",\n  retrievedAt: now() as String\n}`
  },
  {
    num: "04",
    title: "User Auth System",
    category: "Security / Node.js",
    difficulty: "intermediate",
    time: "3–5 days",
    description: "Build a complete register/login system with JWT authentication. Hash passwords with bcrypt, issue signed tokens on login, protect routes with Express middleware, and persist users in PostgreSQL. Add token refresh and logout support.",
    why: "Auth is in every production app. Understanding it deeply — how tokens work, why passwords must be hashed, how middleware guards routes — separates junior from mid-level developers.",
    skills: ["JWT Tokens", "bcrypt Hashing", "Auth Middleware", "PostgreSQL", "Protected Routes"],
    endpoint: "POST /auth/register\nPOST /auth/login\nPOST /auth/refresh\nGET /auth/me (protected)",
    lang: "JavaScript (Node.js)",
    code: `const bcrypt = require('bcrypt');\nconst jwt = require('jsonwebtoken');\n\n// Register\nconst hash = await bcrypt.hash(req.body.password, 12);\nawait db.users.create({ email, passwordHash: hash });\n\n// Login\nconst match = await bcrypt.compare(password, user.passwordHash);\nif (!match) return res.status(401).json({ error: 'Invalid credentials' });\n\nconst token = jwt.sign(\n  { userId: user.id, email: user.email },\n  process.env.JWT_SECRET,\n  { expiresIn: '7d' }\n);\nres.json({ token });`
  },
  {
    num: "05",
    title: "Real-Time Chat App",
    category: "Node.js / WebSocket",
    difficulty: "intermediate",
    time: "3–5 days",
    description: "Build a live chat app using Socket.io on the backend and React on the frontend. Support multiple rooms, online user lists, and typing indicators. No page refresh — messages appear instantly for everyone in the room.",
    why: "WebSockets are how modern apps like Slack, Discord, and live NOC dashboards work. This teaches event-driven architecture — a skill that carries into monitoring tools and real-time systems.",
    skills: ["Socket.io", "Event Emitters", "React useEffect", "Rooms & Namespaces", "Broadcast vs Emit"],
    endpoint: "WS: join-room\nWS: send-message\nWS: receive-message\nWS: user-typing",
    lang: "JavaScript (Socket.io)",
    code: `io.on('connection', (socket) => {\n  console.log('User connected:', socket.id);\n\n  socket.on('join-room', ({ room, username }) => {\n    socket.join(room);\n    socket.to(room).emit('user-joined', { username });\n  });\n\n  socket.on('send-message', ({ room, message, username }) => {\n    io.to(room).emit('receive-message', {\n      username,\n      message,\n      timestamp: new Date().toISOString()\n    });\n  });\n\n  socket.on('disconnect', () => {\n    console.log('User disconnected:', socket.id);\n  });\n});`
  },
  {
    num: "06",
    title: "Salesforce Integration API",
    category: "MuleSoft / Enterprise",
    difficulty: "intermediate",
    time: "3–4 days",
    description: "Use MuleSoft's Salesforce connector to query Leads and Contacts via SOQL, transform the response with DataWeave, and expose as a clean REST API. Add pagination, filtering by status, and a POST endpoint to create new Leads.",
    why: "MuleSoft's core value is enterprise integration. Salesforce is the #1 connector used in real client projects. This combo is what gets you hired at MuleSoft consulting firms.",
    skills: ["Salesforce Connector", "SOQL Queries", "DataWeave Mapping", "Pagination", "Error Handling"],
    endpoint: "GET /sf/leads?status=Open\nGET /sf/contacts/{id}\nPOST /sf/leads",
    lang: "DataWeave + SOQL",
    code: `// SOQL in Salesforce Select operation\nSELECT Id, Name, Email, Phone, Status, CreatedDate\nFROM Lead\nWHERE Status = :status\nORDER BY CreatedDate DESC\nLIMIT :pageSize OFFSET :offset\n\n// DataWeave response transform\n%dw 2.0\noutput application/json\n---\n{\n  total: sizeOf(payload),\n  data: payload map (lead) -> {\n    id: lead.Id,\n    name: lead.Name,\n    email: lead.Email,\n    status: lead.Status\n  }\n}`
  },
  {
    num: "07",
    title: "Expense Tracker PWA",
    category: "React / PWA / Charts",
    difficulty: "intermediate",
    time: "2–4 days",
    description: "A React PWA that tracks income and expenses by category. Shows monthly trends with Recharts, calculates balance automatically, and persists all data in localStorage. Add CSV export and a bill due-date notification system using the Notifications API.",

let currentFilter = 'all';
let currentIndex = 0;

function getVisible() {
  if (currentFilter === 'all') return projects.map((_, i) => i);
  return projects.map((p, i) => p.difficulty === currentFilter ? i : -1).filter(i => i >= 0);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const visible = getVisible();
  currentIndex = visible.length > 0 ? visible[0] : 0;
  renderSidebar();
  renderMain();
}

function selectProject(idx) {
  currentIndex = idx;
  renderSidebar();
  renderMain();
  document.querySelector('.main').scrollTo({ top: 0, behavior: 'smooth' });
}

function diffClass(d) {
  return 'diff-' + d;
}

function diffLabel(d) {
  return d.charAt(0).toUpperCase() + d.slice(1);
}

function renderSidebar() {
  const visible = getVisible();
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = projects.map((p, i) => {
    const isVisible = visible.includes(i);
    const isActive = i === currentIndex;
    return `<div class="nav-item ${isActive ? 'active' : ''} ${!isVisible ? 'hidden' : ''}" onclick="selectProject(${i})">
      <div class="nav-top">
        <span class="nav-num">${p.num}</span>
        <span class="nav-badge diff-${p.difficulty}" style="font-size:8px;padding:2px 6px;border-radius:3px;border:1px solid;font-weight:700;letter-spacing:1px;text-transform:uppercase;${p.difficulty==='beginner'?'color:var(--beginner);border-color:rgba(34,197,94,0.35);background:rgba(34,197,94,0.08)':p.difficulty==='intermediate'?'color:var(--intermediate);border-color:rgba(245,158,11,0.35);background:rgba(245,158,11,0.08)':'color:var(--advanced);border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.08)'}">${diffLabel(p.difficulty)}</span>
      </div>
      <div class="nav-title">${p.title}</div>
      <div class="nav-cat">${p.category}</div>
    </div>`;
  }).join('');
}

function renderMain() {
  const visible = getVisible();
  const panel = document.getElementById('mainPanel');

  if (visible.length === 0) {
    panel.innerHTML = '<div class="empty-state">No projects match this filter.</div>';
    updateProgress();
    return;
  }

  if (!visible.includes(currentIndex)) {
    currentIndex = visible[0];
  }

  const p = projects[currentIndex];
  const visIdx = visible.indexOf(currentIndex);
  const hasPrev = visIdx > 0;
  const hasNext = visIdx < visible.length - 1;

  const diffStyle = p.difficulty === 'beginner'
    ? 'color:var(--beginner);border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.1)'
    : p.difficulty === 'intermediate'
    ? 'color:var(--intermediate);border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.1)'
    : 'color:var(--advanced);border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.1)';

  panel.innerHTML = `
    <div class="proj-header">
      <div class="proj-title-block">
        <span class="proj-number">${p.num}</span>
        <div>
          <div class="proj-title">${p.title}</div>
          <div class="proj-cat">${p.category}</div>
        </div>
      </div>
      <div class="proj-meta">
        <span class="badge" style="${diffStyle}">${diffLabel(p.difficulty)}</span>
        <span class="time-badge">⏱ ${p.time}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Description</div>
      <div class="desc-text">${p.description}</div>
    </div>

    <div class="why-card">
      <span class="why-icon">💡</span>
      <div>
        <div class="why-label">Why Build This</div>
        <div class="why-text">${p.why}</div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-label">Skills You'll Learn</div>
        <div class="skills-wrap">
          ${p.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-label">Key Endpoints / Interface</div>
        <div class="endpoint-box">${p.endpoint.replace(/\n/g, '<br/>')}</div>
      </div>
    </div>

    <div class="card-label" style="margin-bottom:10px;">Code Sample</div>
    <div class="code-block">
      <div class="code-header">
        <div class="code-dots">
          <div class="code-dot" style="background:#ff5f56"></div>
          <div class="code-dot" style="background:#ffbd2e"></div>
          <div class="code-dot" style="background:#27c93f"></div>
        </div>
        <span class="code-lang">${p.lang}</span>
      </div>
      <div class="code-content">${escHtml(p.code)}</div>
    </div>

    <div class="nav-footer">
      <button class="nav-btn prev" onclick="navigate(-1)" ${!hasPrev ? 'disabled' : ''}>← Prev</button>
      <span class="nav-counter">${visIdx + 1} / ${visible.length}</span>
      <button class="nav-btn next" onclick="navigate(1)" ${!hasNext ? 'disabled' : ''}>Next →</button>
    </div>
  `;

  updateProgress();
}

function navigate(dir) {
  const visible = getVisible();
  const visIdx = visible.indexOf(currentIndex);
  const newVisIdx = visIdx + dir;
  if (newVisIdx >= 0 && newVisIdx < visible.length) {
    currentIndex = visible[newVisIdx];
    renderSidebar();
    renderMain();
    document.querySelector('.main').scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function updateProgress() {
  const visible = getVisible();
  const visIdx = visible.indexOf(currentIndex);
  const pct = visible.length > 1 ? ((visIdx + 1) / visible.length) * 100 : 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
renderSidebar();
renderMain();
</script>
</body>
</html>
