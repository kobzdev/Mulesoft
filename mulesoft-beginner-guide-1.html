<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MuleSoft for Beginners – 15 Projects Step by Step</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f8fc;--white:#fff;--border:#e2e6f0;--border2:#cdd3e6;
  --navy:#0d1b3e;--blue:#1a6cf5;--teal:#00b8a9;--green:#22c55e;
  --orange:#f97316;--red:#ef4444;
  --text:#1a2340;--text2:#4a5680;--text3:#8090b8;
  --code-bg:#0f172a;--mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(10,20,60,0.18);}
.tb-logo{display:flex;align-items:center;gap:12px;padding:0 24px;border-right:1px solid rgba(255,255,255,0.1);height:100%;min-width:210px;}
.tb-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;}
.tb-brand{font-size:15px;font-weight:700;}
.tb-brand span{color:#60a5fa;}
.tb-filters{display:flex;align-items:center;gap:6px;padding:0 16px;flex:1;overflow-x:auto;}
.tb-filters::-webkit-scrollbar{display:none;}
.ftag{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);white-space:nowrap;transition:all .15s;font-family:var(--sans);}
.ftag:hover{border-color:#60a5fa;color:#60a5fa;}
.ftag.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.ftag.fb.active{background:var(--green);border-color:var(--green);}
.ftag.fi.active{background:var(--orange);border-color:var(--orange);}
.ftag.fa.active{background:var(--red);border-color:var(--red);}
.tb-right{padding:0 20px;border-left:1px solid rgba(255,255,255,0.1);height:100%;display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap;font-family:var(--mono);}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:flex;min-height:calc(100vh - 56px);}
.sidebar{width:260px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.nav-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.nav-item:hover{background:#f4f6ff;}
.nav-item.active{background:#eef2ff;border-left-color:var(--blue);}
.nav-item.hidden{display:none;}
.nav-num{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text3);min-width:22px;margin-top:2px;}
.nav-item.active .nav-num{color:var(--blue);}
.nav-info{flex:1;min-width:0;}
.nav-title{font-size:12px;font-weight:600;color:var(--text2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item.active .nav-title{color:var(--navy);}
.nav-pill{display:inline-block;margin-top:3px;font-size:8px;font-weight:700;padding:1px 7px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase;}
.main{flex:1;overflow-y:auto;background:var(--bg);}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.hero{background:var(--navy);color:#fff;padding:32px 40px 28px;animation:fadeUp .22s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:12px;}
.hero-left{display:flex;align-items:center;gap:16px;}
.hero-num{font-family:var(--mono);font-size:52px;font-weight:800;color:rgba(255,255,255,0.08);line-height:1;user-select:none;min-width:76px;}
.hero-title{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-bottom:5px;}
.hero-cat{font-size:11px;color:rgba(255,255,255,0.4);font-family:var(--mono);letter-spacing:.5px;}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.htag{font-size:10px;font-weight:700;padding:4px 13px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;border:1.5px solid;}
.timetag{font-size:10px;padding:4px 13px;border-radius:20px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.45);border:1.5px solid rgba(255,255,255,0.12);font-family:var(--mono);}
.hero-desc{font-size:14px;line-height:1.8;color:rgba(255,255,255,0.5);max-width:740px;}
.begin-banner{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1.5px solid #bfdbfe;border-radius:12px;padding:14px 18px;margin:24px 40px 0;display:flex;gap:12px;align-items:flex-start;}
.bb-icon{font-size:20px;flex-shrink:0;}
.bb-title{font-size:12px;font-weight:700;color:#1e40af;margin-bottom:3px;}
.bb-text{font-size:12px;color:#3b5bdb;line-height:1.6;}
.steps-wrap{padding:24px 40px 16px;}
.steps-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.sh-label{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:2px;text-transform:uppercase;}
.sh-line{flex:1;height:1.5px;background:var(--border);}
.sh-count{font-size:11px;color:var(--text3);font-family:var(--mono);}
.step{display:flex;gap:0;margin-bottom:8px;position:relative;}
.step:not(:last-child)::before{content:'';position:absolute;left:14px;top:36px;bottom:-8px;width:2px;background:var(--border);}
.step-left{width:30px;flex-shrink:0;padding-top:10px;display:flex;flex-direction:column;align-items:center;}
.step-num{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);cursor:pointer;z-index:1;transition:all .2s;font-family:var(--mono);}
.step-num:hover{border-color:var(--blue);color:var(--blue);}
.step-num.done{background:var(--green);border-color:var(--green);color:#fff;}
.step-box{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:10px;margin-left:10px;overflow:hidden;transition:border-color .15s;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.step-box:hover{border-color:var(--border2);}
.step-box.open-box{border-color:var(--blue);box-shadow:0 2px 12px rgba(26,108,245,0.10);}
.step-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;}
.s-num{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--text3);min-width:40px;}
.s-title{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.s-tag{font-size:9px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.5px;text-transform:uppercase;}
.s-arrow{font-size:10px;color:var(--text3);transition:transform .2s;}
.step-head.open .s-arrow{transform:rotate(180deg);}
.step-body{display:none;border-top:1.5px solid var(--border);}
.step-body.open{display:block;}
.what-block{background:#f8faff;border-bottom:1.5px solid var(--border);padding:12px 18px;display:flex;gap:10px;}
.what-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.what-label{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.what-text{font-size:13px;color:var(--text2);line-height:1.7;}
.instr-block{padding:14px 18px;}
.instr-title{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.instr-title::after{content:'';flex:1;height:1px;background:var(--border);}
.instr-list{list-style:none;display:flex;flex-direction:column;gap:9px;}
.instr-item{display:flex;align-items:flex-start;gap:10px;}
.instr-badge{min-width:22px;height:22px;border-radius:5px;background:#eef2ff;border:1.5px solid #c7d2fe;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--blue);flex-shrink:0;margin-top:1px;}
.instr-text{font-size:13px;color:var(--text2);line-height:1.7;}
.instr-text b{color:var(--navy);font-weight:700;}
.instr-text code{font-family:var(--mono);font-size:11px;background:#eef2ff;color:var(--blue);padding:1px 5px;border-radius:4px;}
.where-block{background:#fefce8;border:1.5px solid #fde68a;border-radius:8px;padding:9px 13px;margin:8px 18px 0;display:flex;gap:9px;font-size:12px;color:#92400e;line-height:1.6;}
.tip-block{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:8px;padding:9px 13px;margin:8px 18px 12px;display:flex;gap:9px;font-size:12px;color:#166534;line-height:1.6;}
.warn-block{background:#fff7ed;border:1.5px solid #fed7aa;border-radius:8px;padding:9px 13px;margin:8px 18px 12px;display:flex;gap:9px;font-size:12px;color:#9a3412;line-height:1.6;}
.block-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.code-wrap{margin:10px 18px 14px;border-radius:9px;overflow:hidden;border:1.5px solid #1e293b;}
.code-bar{background:#1e293b;padding:7px 14px;display:flex;align-items:center;justify-content:space-between;}
.code-dots{display:flex;gap:5px;}
.cdot{width:9px;height:9px;border-radius:50%;}
.code-lang{font-family:var(--mono);font-size:9px;color:#64748b;letter-spacing:2px;text-transform:uppercase;}
.code-body{background:var(--code-bg);padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.9;color:#7dd3a8;white-space:pre;overflow-x:auto;}
.code-body::-webkit-scrollbar{height:3px;}
.code-body::-webkit-scrollbar-thumb{background:#334155;}
.result-block{background:#f0fdf4;border-top:1.5px solid #bbf7d0;padding:11px 18px;display:flex;gap:10px;align-items:flex-start;}
.rb-label{font-size:9px;font-weight:700;color:#166534;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.rb-text{font-size:12px;color:#15803d;line-height:1.6;}
.skills-wrap{padding:6px 40px 20px;}
.sk-label{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sk-label::after{content:'';flex:1;height:1.5px;background:var(--border);}
.sk-chips{display:flex;flex-wrap:wrap;gap:8px;}
.sk-chip{font-size:11px;font-weight:500;padding:5px 12px;border-radius:7px;background:var(--white);border:1.5px solid var(--border2);color:var(--text2);font-family:var(--mono);}
.bnav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px 36px;border-top:1.5px solid var(--border);}
.bnav-btn{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--sans);}
.bp{background:var(--white);color:var(--text2);border:1.5px solid var(--border2);}
.bp:hover:not(:disabled){border-color:var(--navy);color:var(--navy);}
.bn{background:var(--blue);color:#fff;border:none;}
.bn:hover:not(:disabled){background:#1558cc;}
.bnav-btn:disabled{opacity:.3;cursor:default;}
.bnav-mid{text-align:center;}
.bnav-name{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;}
.prog-bar-wrap{width:160px;height:5px;background:var(--border);border-radius:10px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:10px;transition:width .3s;}
.empty{padding:80px;text-align:center;color:var(--text3);font-size:14px;}
@media(max-width:720px){
  .sidebar{width:190px;}
  .hero,.steps-wrap,.skills-wrap,.bnav,.begin-banner{padding-left:16px;padding-right:16px;}
  .hero-num{font-size:38px;min-width:54px;}
  .hero-title{font-size:20px;}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-logo">
    <div class="tb-icon">M</div>
    <div class="tb-brand">Mule<span>Guide</span></div>
  </div>
  <div class="tb-filters">
    <button class="ftag active" onclick="setFilter('all',this)">All (15)</button>
    <button class="ftag fb" onclick="setFilter('beginner',this)">&#x1F7E2; Beginner</button>
    <button class="ftag fi" onclick="setFilter('intermediate',this)">&#x1F7E0; Intermediate</button>
    <button class="ftag fa" onclick="setFilter('advanced',this)">&#x1F534; Advanced</button>
  </div>
  <div class="tb-right"><div class="pulse"></div><span id="doneCount">0 / 0 steps done</span></div>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>
