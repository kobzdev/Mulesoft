er app, change it to 8082 in the connector config.", "result": "Both components on canvas with no red error icons."}, {"title": "Run Locally and Test in Postman", "tag": "Test", "tagColor": "#059669", "what": "Start your MuleSoft app on your computer and test it using Postman or your browser.", "where": "Package Explorer (left side) → right-click project", "instructions": ["Right-click <b>hello-world-api</b> in Package Explorer → <b>Run As</b> → <b>Mule Application</b>.", "Watch the <b>Console</b> panel at the bottom of Studio.", "Wait until you see: <b>STARTED app 'hello-world-api'</b> — this means it is running!", "Open Postman → send: <code>GET http://localhost:8081/hello</code>", "You should see the greeting response with a timestamp.", "To stop: click the red square (Stop) button in the Console toolbar."], "code": "// Expected response in Postman:\n\"Hello from MuleSoft! Time: 2025-05-10T10:30:00\"\n\n// Console shows:\n[INFO] STARTED app 'hello-world-api'\n[INFO] Listening on port 8081", "codeLang": "Expected Output", "tip": "You can also just open a browser and go to http://localhost:8081/hello to see the response.", "result": "Postman shows your greeting with the current timestamp. Your first MuleSoft API works!"}, {"title": "Deploy to CloudHub", "tag": "Deploy", "tagColor": "#d97706", "what": "Deploy your API to CloudHub to get a real public URL accessible from anywhere on the internet.", "where": "Package Explorer → right-click your project", "instructions": ["Right-click <b>hello-world-api</b> → <b>Anypoint Platform</b> → <b>Deploy to CloudHub</b>.", "Log in with your Anypoint Platform credentials.", "Set <b>App Name</b>: <code>hello-world-api-yourname</code> (must be globally unique).", "Set <b>Worker Size</b>: <code>0.1 vCores</code> (free tier).", "Click <b>Deploy Application</b> and wait 2-3 minutes.", "Go to anypoint.mulesoft.com → <b>Runtime Manager</b> → confirm status is <b>Running</b> (green).", "Test your live URL: <code>https://hello-world-api-yourname.us-e2.cloudhub.io/hello</code>"], "code": "// Your live CloudHub URL:\nhttps://hello-world-api-yourname.us-e2.cloudhub.io/hello\n\n// Test in Postman:\nGET https://hello-world-api-yourname.us-e2.cloudhub.io/hello\n\n// Response:\n\"Hello from MuleSoft! Time: 2025-05-10T...\"", "codeLang": "CloudHub URL", "tip": "CloudHub app names are globally unique. If taken, add numbers: hello-world-api-kobi123", "result": "Your API is live on a public URL! Anyone with the URL can call your API."}]}, {"num": "02", "title": "Return JSON Data API", "category": "Anypoint Studio · DataWeave · Transform Message", "diff": "beginner", "time": "1-2 days", "desc": "Learn to return proper JSON data instead of plain text. Use Transform Message and DataWeave to build structured JSON responses — the format all real APIs use.", "why": "Every real API returns JSON. DataWeave is the most important MuleSoft skill — this teaches the core syntax used in every project.", "skills": ["Transform Message", "DataWeave", "output application/json", "uuid()", "now()", "Array in DataWeave"], "steps": [{"title": "Create Project and Add Transform Message", "tag": "Setup", "tagColor": "#1a6cf5", "what": "Create a new project and use Transform Message instead of Set Payload. Transform Message gives you full DataWeave control for building complex JSON.", "where": "File → New → Mule Project", "instructions": ["Create project: <code>json-data-api</code>, Port <code>8082</code>, Path <code>/products</code>.", "Add HTTP Listener from Mule Palette (same as Project 01).", "In Mule Palette, search <code>Transform Message</code> → drag it to the RIGHT of the Listener.", "Click Transform Message — the DataWeave editor opens in the bottom panel.", "Delete all default code in the editor."], "code": "// Transform Message gives full DataWeave control\n// Always start with these 3 lines:\n\n%dw 2.0\noutput application/json\n---\n// Your JSON goes below the ---", "codeLang": "DataWeave Header", "tip": "Use Transform Message whenever you need to return JSON or reshape data. The --- (three dashes) are REQUIRED — they separate the header from the data body.", "result": "Transform Message on canvas, DataWeave editor open at the bottom."}, {"title": "Write DataWeave to Return JSON", "tag": "DataWeave", "tagColor": "#7c3aed", "what": "Write a DataWeave script that returns a structured JSON response with multiple fields and an array of products.", "where": "DataWeave editor in the bottom panel of Studio", "instructions": ["In the DataWeave editor, type the code shown below.", "Line 1: <code>%dw 2.0</code> declares the DataWeave version.", "Line 2: <code>output application/json</code> tells Mule to return JSON.", "Line 3: <code>---</code> is required — separates header from data.", "Below <code>---</code>: your JSON structure.", "Save with Ctrl+S — no red errors should appear.", "Run and test: <code>GET http://localhost:8082/products</code>"], "code": "%dw 2.0\noutput application/json\n---\n{\n  success:     true,\n  requestId:   uuid(),\n  generatedAt: now() as String,\n  count: 3,\n  products: [\n    { id: 1, name: \"MuleSoft T-Shirt\", price: 299.00, currency: \"PHP\" },\n    { id: 2, name: \"API Design Book\",  price: 599.00, currency: \"PHP\" },\n    { id: 3, name: \"CloudHub Mug\",     price: 199.00, currency: \"PHP\" }\n  ]\n}", "codeLang": "DataWeave", "tip": "Call the API 3 times — notice requestId changes every time. uuid() generates a unique ID on each request. now() returns the current timestamp.", "result": "Status 200 OK. Response is formatted JSON. Content-Type header shows application/json."}]}, {"num": "03", "title": "Read URL Query Parameters", "category": "Anypoint Studio · HTTP Attributes · DataWeave", "diff": "beginner", "time": "1 day", "desc": "Learn to read values sent in the URL like /greet?name=Kobi&city=Cebu. Your API reads these and uses them in the response. This is how all search and filter APIs work.", "why": "Query parameters are in every real API. Required knowledge for building any dynamic API.", "skills": ["attributes.queryParams", "default values", "string concatenation", "dynamic responses", "URL parameters"], "steps": [{"title": "Understand Query Parameters", "tag": "Concept", "tagColor": "#1a6cf5", "what": "Query parameters are the ?key=value parts of a URL. MuleSoft puts them in attributes.queryParams automatically — you just read them in DataWeave.", "where": "Concept step — no clicking needed", "instructions": ["A URL like <code>/greet?name=Kobi</code> has one query param: name = Kobi.", "Multiple params use <code>&amp;</code>: <code>/greet?name=Kobi&amp;city=Cebu</code>", "In DataWeave access them: <code>attributes.queryParams.name</code>", "If the param is missing, it returns null — use <code>default</code> to set a fallback value.", "Safe access with default: <code>attributes.queryParams.name default \"Guest\"</code>"], "code": "// URL patterns and what you get:\n/greet                     -> name is null -> default 'Guest'\n/greet?name=Kobi           -> name is 'Kobi'\n/greet?name=Kobi&city=Cebu -> name='Kobi', city='Cebu'\n\n// DataWeave to read them safely:\nattributes.queryParams.name default \"Guest\"\nattributes.queryParams.city default \"Unknown City\"", "codeLang": "Concept", "tip": "'attributes' holds everything about the incoming request: URL, headers, query params, URI params, method, etc.", "result": "You understand what query params are and how to access them safely with defaults."}, {"title": "Build and Test the Greeting API", "tag": "Build + Test", "tagColor": "#059669", "what": "Build an API that reads name and city from the URL and responds with a personalized greeting.", "where": "File → New → Mule Project", "instructions": ["Create project: <code>query-params-api</code>, Port <code>8083</code>, Path <code>/greet</code>.", "Add HTTP Listener then Transform Message.", "Type the DataWeave code shown below.", "Run and test with 3 different URLs shown in the code block.", "Each URL should return a different greeting."], "code": "%dw 2.0\noutput application/json\n---\n{\n  name:     attributes.queryParams.name default \"Guest\",\n  city:     attributes.queryParams.city default \"Unknown City\",\n  greeting: \"Hello \" ++ (attributes.queryParams.name default \"Guest\")\n            ++ \" from \" ++ (attributes.queryParams.city default \"Unknown City\") ++ \"!\",\n  timestamp: now() as String\n}\n\n// Test these 3 URLs:\nGET /greet                        -> Hello Guest from Unknown City!\nGET /greet?name=Kobi              -> Hello Kobi from Unknown City!\nGET /greet?name=Kobi&city=Cebu   -> Hello Kobi from Cebu!", "codeLang": "DataWeave + Test URLs", "tip": "The ++ operator joins strings in DataWeave. It is like + in JavaScript or & in Excel formulas.", "result": "All 3 test URLs return different personalized greetings based on the URL parameters."}]}, {"num": "04", "title": "POST Request — Read a Body", "category": "Anypoint Studio · HTTP POST · payload", "diff": "beginner", "time": "1-2 days", "desc": "Learn to receive data sent by the caller in the request body. This is how login forms, registration APIs, and all send-data-to-server scenarios work.", "why": "POST requests with JSON bodies are the most common API pattern. Every form submission uses this.", "skills": ["HTTP POST", "payload variable", "Request Body", "Content-Type header", "Postman Body tab", "uuid()"], "steps": [{"title": "Understand payload and Build the API", "tag": "Build", "tagColor": "#7c3aed", "what": "When a POST request arrives with a JSON body, MuleSoft parses it and stores it in a variable called payload. You read from payload.fieldName in DataWeave.", "where": "File → New → Mule Project", "instructions": ["Create project: <code>post-body-api</code>, Port <code>8084</code>, Path <code>/register</code>.", "Add Transform Message after HTTP Listener.", "In DataWeave, use <code>payload.name</code>, <code>payload.email</code> to read from the request body.", "Add server-generated fields: <code>userId: uuid()</code>, <code>createdAt: now() as String</code>.", "Save and run."], "code": "%dw 2.0\noutput application/json\n---\n{\n  status:    \"registered\",\n  userId:    uuid(),\n  name:      payload.name,\n  email:     payload.email,\n  role:      payload.role default \"user\",\n  createdAt: now() as String,\n  message:   \"Welcome, \" ++ payload.name ++ \"! Account created.\"\n}", "codeLang": "DataWeave", "tip": "payload always holds the main data flowing through your flow. Every component can read it.", "result": "App running on http://localhost:8084/register ready to accept POST requests."}, {"title": "Test with Postman POST Request", "tag": "Test", "tagColor": "#059669", "what": "Use Postman to send a POST request with a JSON body. You must set the Content-Type header and use the Body tab.", "where": "Postman application", "instructions": ["Open Postman → change method dropdown from GET to <b>POST</b>.", "URL: <code>http://localhost:8084/register</code>", "Click <b>Headers</b> tab → add: Key = <code>Content-Type</code>, Value = <code>application/json</code>.", "Click <b>Body</b> tab → select <b>raw</b> → select <b>JSON</b> from the dropdown.", "Paste the request body JSON below into the text area.", "Click <b>Send</b> — response shows your registration confirmation."], "code": "// Request body (paste in Postman Body > raw > JSON):\n{\n  \"name\": \"Kobi\",\n  \"email\": \"kobi@test.com\",\n  \"role\": \"developer\"\n}\n\n// Expected response:\n{\n  \"status\": \"registered\",\n  \"userId\": \"a1b2c3d4-...\",\n  \"name\": \"Kobi\",\n  \"email\": \"kobi@test.com\",\n  \"role\": \"developer\",\n  \"createdAt\": \"2025-05-10T...\",\n  \"message\": \"Welcome, Kobi! Account created.\"\n}", "codeLang": "Postman Test", "warn": "If you forget Content-Type: application/json in Postman headers, MuleSoft will not parse the body and payload will be empty.", "result": "Response shows status: 'registered' with a unique userId and your input data echoed back."}]}, {"num": "05", "title": "Logger and Error Handling", "category": "Anypoint Studio · Logger · Try Scope", "diff": "beginner", "time": "2-3 days", "desc": "Add logging to see what happens inside your flows, and add error handling so your API returns clean JSON errors instead of ugly Mule XML crash messages.", "why": "Logging and error handling are the difference between a toy API and a production-ready one. Every real project needs both.", "skills": ["Logger", "Log levels", "Try Scope", "On Error Continue", "error variable", "HTTP status codes"], "steps": [{"title": "Add a Logger Component", "tag": "Logging", "tagColor": "#1a6cf5", "what": "Logger is like console.log() in JavaScript. It prints messages to the Studio Console so you can see what data is flowing through. Critical for debugging.", "where": "Mule Palette → search Logger", "instructions": ["In Mule Palette, search <code>Logger</code> → drag it BEFORE your Transform Message.", "Click Logger → in Properties, set <b>Level</b> to <code>INFO</code>.", "Click <b>fx</b> next to Message and type the DataWeave expression below.", "Run the app and call the API — watch the Studio Console for your log line."], "code": "// Logger Message expression:\n#[\n  \">>> Request: \"\n  ++ attributes.method\n  ++ \" \" ++ attributes.requestPath\n  ++ \" at \" ++ (now() as String)\n]\n\n// Console output:\n[INFO] >>> Request: GET /greet at 2025-05-10T10:30:00", "codeLang": "Logger Expression", "tip": "Add Loggers before and after important components to trace data as it flows. This is how you debug MuleSoft issues.", "result": "Studio Console shows your log message every time you call the API."}, {"title": "Add Try Scope for Error Handling", "tag": "Error Handling", "tagColor": "#dc2626", "what": "A Try Scope wraps your components and catches errors. Without it, errors return Mule XML. With it, you control the error response your callers see.", "where": "Mule Palette → Core → Try", "instructions": ["Search <code>Try</code> in Mule Palette → drag it onto canvas.", "Move your existing components INSIDE the Try scope box.", "Inside Try you see <b>Error Handler</b> at the bottom with <b>On Error Continue</b>.", "Inside On Error Continue, add <b>Set Payload</b> with the error JSON below.", "In HTTP Listener → Responses → Error Response → Status Code: <code>#[vars.httpStatus default 500]</code>.", "Add Set Variable before Set Payload: name = <code>httpStatus</code>, value = <code>#[400]</code>."], "code": "%dw 2.0\noutput application/json\n---\n// Set Payload inside On Error Continue:\n{\n  success:   false,\n  errorCode: error.errorType.identifier,\n  message:   error.description,\n  path:      attributes.requestPath,\n  timestamp: now() as String\n}\n\n// Result: errors return clean JSON instead of ugly XML", "codeLang": "Error Handler", "tip": "On Error Continue: catches error, flow finishes normally with your custom response. On Error Propagate: catches and re-throws the error to the caller.", "result": "Errors now return clean JSON with the correct HTTP status code instead of Mule's default XML."}]}, {"num": "06", "title": "Weather Dashboard API", "category": "Anypoint Studio · HTTP Request · OpenWeatherMap API", "diff": "beginner", "time": "2-3 days", "desc": "Call the free OpenWeatherMap API from MuleSoft, transform the response with DataWeave, and return clean weather data. Your first real integration — MuleSoft as a middleman between caller and external service.", "why": "Calling external APIs is what most MuleSoft developers do daily. This teaches the integration pattern used in 90% of real enterprise projects.", "skills": ["HTTP Request connector", "External API", "Base URL config", "URI params", "DataWeave transform", "Error handling for API failures"], "steps": [{"title": "Get a Free OpenWeatherMap API Key", "tag": "API Key", "tagColor": "#1a6cf5", "what": "OpenWeatherMap is a free weather API. You need a free API key to authenticate your requests. This simulates how real enterprise APIs require authentication.", "where": "Browser → openweathermap.org", "instructions": ["Go to <b>openweathermap.org</b> → click <b>Sign In</b> → create a free account.", "After signing in, click your username → <b>My API Keys</b>.", "Copy your Default API key.", "Wait 10-15 minutes for the key to activate (new keys take time).", "Test in browser: <code>https://api.openweathermap.org/data/2.5/weather?q=Cebu&appid=YOUR_KEY&units=metric</code>", "You see raw JSON weather data — this confirms your key works."], "code": "// Raw response from OpenWeatherMap:\n{\n  \"name\": \"Cebu City\",\n  \"main\": {\n    \"temp\": 31.5,\n    \"feels_like\": 38.2,\n    \"humidity\": 78\n  },\n  \"weather\": [\n    { \"description\": \"few clouds\" }\n  ],\n  \"wind\": { \"speed\": 4.5 },\n  \"sys\": { \"country\": \"PH\" }\n}\n// Store your key in config.properties:\n// weather.api.key=your_key_here", "codeLang": "API Response + Config", "tip": "Keep your API key in config.properties, never hardcode it in XML. Add config.properties to .gitignore.", "result": "Browser shows raw weather JSON. API key is working correctly."}, {"title": "Create Project and Store API Key Securely", "tag": "Setup", "tagColor": "#1a6cf5", "what": "Create the MuleSoft project and store your API key safely in a properties file so it is never hardcoded in your flow XML.", "where": "File → New → Mule Project", "instructions": ["Create project: <code>weather-api</code>.", "In Package Explorer → expand project → <b>src/main/resources</b>.", "Right-click <b>resources</b> → <b>New → File</b> → name: <code>config.properties</code>.", "Add your key as shown in the code block.", "Add a <b>Configuration Properties</b> Global Element: click Global Elements tab → Create → Configuration Properties → file: <code>config.properties</code>."], "code": "# config.properties:\nweather.api.key=your_actual_api_key_here\n\n<!-- Global Element in XML -->\n<configuration-properties file=\"config.properties\"/>\n\n# To read in DataWeave:\np('weather.api.key')", "codeLang": "config.properties", "tip": "p('property.name') is the DataWeave function to read from config.properties. Always use this instead of hardcoding values.", "result": "config.properties created with API key. Global Element loads it at startup."}, {"title": "Build the HTTP Request to OpenWeatherMap", "tag": "HTTP Request", "tagColor": "#7c3aed", "what": "Add the HTTP Request component to call OpenWeatherMap, pass the city from the URL, and transform the response to return clean weather JSON.", "where": "Mule Palette → HTTP → Request", "instructions": ["Add HTTP Listener: Port <code>8085</code>, Path <code>/weather/{city}</code>.", "Drag <b>HTTP Request</b> after the Listener.", "Click + on Connector Config → Base URL: <code>https://api.openweathermap.org</code>.", "HTTP Request Properties: Method = GET, Path = <code>/data/2.5/weather</code>.", "In <b>Query Parameters</b> tab add: <code>q</code> = <code>#[attributes.uriParams.city]</code>, <code>appid</code> = <code>#[p('weather.api.key')]</code>, <code>units</code> = <code>metric</code>.", "Add Transform Message after HTTP Request with DataWeave below.", "Test: <code>GET http://localhost:8085/weather/Cebu</code>"], "code": "%dw 2.0\noutput application/json\n---\n{\n  city:        payload.name,\n  country:     payload.sys.country,\n  temperature: payload.main.temp,\n  feelsLike:   payload.main.feels_like,\n  humidity:    payload.main.humidity,\n  description: payload.weather[0].description,\n  windSpeed:   payload.wind.speed,\n  fetchedAt:   now() as String\n}\n\n// Test multiple cities:\nGET /weather/Cebu\nGET /weather/Manila\nGET /weather/Tokyo", "codeLang": "DataWeave", "tip": "attributes.uriParams.city reads the {city} part from the URL path. If URL is /weather/Cebu then uriParams.city = 'Cebu'.", "result": "API returns clean weather JSON for any city. Try Cebu, Manila, and Tokyo."}, {"title": "Add Error Handling for Invalid Cities", "tag": "Error Handling", "tagColor": "#dc2626", "what": "Handle the case when someone types an invalid city. OpenWeatherMap returns 404 — catch it and return a friendly JSON error.", "where": "Wrap your HTTP Request and Transform in a Try Scope", "instructions": ["Wrap HTTP Request and Transform Message in a <b>Try Scope</b>.", "Inside Error Handler → <b>On Error Continue</b>.", "Add Set Variable: name = <code>httpStatus</code>, value = <code>#[404]</code>.", "Add Set Payload with the friendly error JSON below.", "Set HTTP Listener Error Response Status Code: <code>#[vars.httpStatus default 500]</code>.", "Test: <code>GET /weather/FakeCity999</code> → returns 404 with friendly message."], "code": "%dw 2.0\noutput application/json\n---\n{\n  success:   false,\n  error:     \"City not found\",\n  city:      attributes.uriParams.city,\n  message:   \"Please check the city name spelling and try again.\",\n  examples:  [\"/weather/Cebu\", \"/weather/Manila\", \"/weather/Tokyo\"],\n  timestamp: now() as String\n}", "codeLang": "Error Payload", "tip": "Always handle external API errors. If OpenWeatherMap is down, return 503. If city not found, return 404. Never let raw errors reach your callers.", "result": "Invalid cities return clean 404 JSON. Valid cities return weather data. API handles all cases gracefully."}]}, {"num": "07", "title": "Currency Converter API", "category": "Anypoint Studio · HTTP Request · ExchangeRate-API", "diff": "beginner", "time": "2-3 days", "desc": "Build a currency converter API using the free ExchangeRate-API. Call /convert?from=USD&to=PHP&amount=100 and get the converted amount. Combines query params, external API call, and DataWeave math.", "why": "Combines everything from previous projects into one practical tool. Great portfolio project that demonstrates integration skills.", "skills": ["ExchangeRate-API", "Query Parameters", "DataWeave math", "Number formatting", "Input validation", "Choice Router"], "steps": [{"title": "Get Free ExchangeRate-API Key and Create Project", "tag": "Setup", "tagColor": "#1a6cf5", "what": "ExchangeRate-API offers 1500 free requests per month. Get a key and create the MuleSoft project.", "where": "Browser → exchangerate-api.com", "instructions": ["Go to <b>exchangerate-api.com</b> → click <b>Get Free Key</b> → sign up.", "Copy your API key from the dashboard.", "Test: <code>https://v6.exchangerate-api.com/v6/YOUR_KEY/pair/USD/PHP/100</code>", "Create project: <code>currency-converter-api</code>, Port <code>8086</code>, Path <code>/convert</code>.", "Add API key to <code>config.properties</code>: <code>exchange.api.key=your_key</code>"], "code": "// ExchangeRate-API /pair endpoint returns:\n{\n  \"base_code\": \"USD\",\n  \"target_code\": \"PHP\",\n  \"conversion_rate\": 56.85,\n  \"conversion_result\": 5685.00\n}\n// It does the math for you!\n// Just pass: FROM currency, TO currency, and AMOUNT in the URL", "codeLang": "API Response", "tip": "The /pair endpoint does the conversion for you — no math needed in DataWeave. Just pass from/to/amount in the path.", "result": "API key working. Browser shows exchange rate JSON with conversion_result."}, {"title": "Build the Converter Flow with Validation", "tag": "Build + Validate", "tagColor": "#7c3aed", "what": "Build the flow that validates inputs, calls ExchangeRate-API, and returns a clean conversion response.", "where": "Canvas in Anypoint Studio", "instructions": ["Add <b>Choice Router</b> between Listener and HTTP Request.", "When condition: <code>#[attributes.queryParams.from == null or attributes.queryParams.to == null]</code>", "In the When branch: Set Payload with the validation error JSON.", "Default branch: HTTP Request to ExchangeRate-API with the path shown below.", "After HTTP Request: Transform Message to format the response.", "Test all 3 cases shown below."], "code": "// HTTP Request path for ExchangeRate-API:\n/v6/#[p('exchange.api.key')]/pair/#[attributes.queryParams.from]/#[attributes.queryParams.to]/#[attributes.queryParams.amount default '1']\n\n// Validation error Set Payload:\n{\n  success: false,\n  error: \"Missing required parameters\",\n  required: [\"from\", \"to\", \"amount\"],\n  example: \"/convert?from=USD&to=PHP&amount=100\"\n}\n\n// Success Transform Message:\n%dw 2.0\noutput application/json\n---\n{\n  from:   payload.base_code,\n  to:     payload.target_code,\n  amount: attributes.queryParams.amount default \"1\",\n  result: payload.conversion_result,\n  rate:   payload.conversion_rate,\n  summary: (attributes.queryParams.amount default \"1\") ++ \" \" ++ payload.base_code\n           ++ \" = \" ++ (payload.conversion_result as String) ++ \" \" ++ payload.target_code\n}\n\n// Test URLs:\nGET /convert                           -> 400 error (missing params)\nGET /convert?from=USD&to=PHP&amount=100 -> success\nGET /convert?from=EUR&to=PHP&amount=50  -> success", "codeLang": "DataWeave + Test", "tip": "Always validate inputs before calling external APIs. Bad inputs waste API quota and give confusing errors.", "result": "Missing params return 400 with instructions. Valid requests return the conversion result."}]}, {"num": "08", "title": "News Aggregator API", "category": "Anypoint Studio · NewsAPI · DataWeave Arrays", "diff": "intermediate", "time": "2-3 days", "desc": "Call the free NewsAPI to fetch top headlines, filter with DataWeave, and return a clean news feed. Teaches advanced DataWeave array operations: filter, map, and keyword search.", "why": "Real APIs return messy data with nested arrays. This teaches you to navigate and reshape complex JSON — a daily task in enterprise MuleSoft.", "skills": ["NewsAPI", "DataWeave filter()", "DataWeave map()", "Array operations", "Nested JSON navigation", "sizeOf()", "Case-insensitive search"], "steps": [{"title": "Get NewsAPI Key and Study the Response", "tag": "API Setup", "tagColor": "#1a6cf5", "what": "NewsAPI is free for developers. Study the raw response structure before writing any DataWeave — always understand the data shape first.", "where": "Browser → newsapi.org", "instructions": ["Go to <b>newsapi.org</b> → <b>Get API Key</b> → sign up free.", "Test: <code>https://newsapi.org/v2/top-headlines?country=ph&apiKey=YOUR_KEY</code>", "Study the response — notice: <code>articles</code> is an array of objects.", "Each article has: <code>title</code>, <code>description</code>, <code>url</code>, <code>source.name</code>, <code>publishedAt</code>.", "Some articles have null titles or '[Removed]' content — you will filter these out.", "Add key to config.properties: <code>news.api.key=your_key</code>"], "code": "// NewsAPI response structure:\n{\n  \"status\": \"ok\",\n  \"totalResults\": 38,\n  \"articles\": [\n    {\n      \"source\": { \"name\": \"BBC News\" },\n      \"title\": \"Example headline\",\n      \"description\": \"Article summary...\",\n      \"url\": \"https://bbc.com/...\",\n      \"publishedAt\": \"2025-05-10T08:00:00Z\",\n      \"author\": \"John Doe\"\n    }\n    // ... 37 more articles\n  ]\n}", "codeLang": "NewsAPI Response", "tip": "Always study the raw API response before writing DataWeave. Draw the structure on paper if needed — understand it, then write the transformation.", "result": "Browser shows news articles JSON. You understand the nested articles array structure."}, {"title": "Build News Flow with Array Operations", "tag": "DataWeave Arrays", "tagColor": "#7c3aed", "what": "Call NewsAPI and use DataWeave filter(), map(), and keyword search to clean and reshape the articles array.", "where": "File → New → Mule Project", "instructions": ["Create project: <code>news-api</code>, Port <code>8087</code>, Path <code>/news</code>.", "Add HTTP Request: Base URL <code>https://newsapi.org</code>, Path <code>/v2/top-headlines</code>.", "Query Params: <code>country</code> = <code>#[attributes.queryParams.country default 'ph']</code>, <code>apiKey</code> = <code>#[p('news.api.key')]</code>.", "Add Transform Message with the DataWeave below.", "Test with different countries and keywords."], "code": "%dw 2.0\noutput application/json\n---\ndo {\n  var keyword = attributes.queryParams.keyword\n\n  // filter() removes articles that don't match the condition\n  var cleaned = payload.articles\n    filter (a) -> a.title != null\n    filter (a) -> not (a.title contains \"[Removed]\")\n    filter (a) -> a.description != null\n    // keyword search (case-insensitive):\n    filter (a) -> if (keyword != null)\n      upper(a.title) contains upper(keyword)\n    else true\n  ---\n  {\n    status:  \"ok\",\n    country: attributes.queryParams.country default \"ph\",\n    keyword: keyword default \"(none)\",\n    total:   payload.totalResults,\n    showing: sizeOf(cleaned),\n    // map() transforms each article to a simpler structure:\n    articles: cleaned map (a) -> {\n      title:  a.title,\n      source: a.source.name,\n      summary: a.description,\n      url:    a.url,\n      author: a.author default \"Unknown\"\n    },\n    fetchedAt: now() as String\n  }\n}\n\n// Test URLs:\nGET /news\nGET /news?country=us\nGET /news?country=us&keyword=AI", "codeLang": "DataWeave Arrays", "tip": "filter() removes items that fail the condition. map() transforms each item. These are the two most-used DataWeave array operations in real enterprise projects.", "result": "API returns clean articles. /news?keyword=AI shows only AI-related headlines."}]}, {"num": "09", "title": "Student Grade Tracker API", "category": "Anypoint Studio · DataWeave Math · Bulk Processing", "diff": "intermediate", "time": "2-3 days", "desc": "POST a list of students with scores and get back calculated averages, letter grades, pass/fail status, and class statistics. Teaches DataWeave math, conditional logic, and custom functions.", "why": "Real enterprise APIs process bulk data. DataWeave math and conditionals are used in payroll, billing, reporting, and analytics APIs.", "skills": ["DataWeave math", "fun keyword", "if/else in DataWeave", "reduce()", "max()", "min()", "bulk POST processing", "Custom functions"], "steps": [{"title": "Design the Grade Logic", "tag": "Concept", "tagColor": "#1a6cf5", "what": "Before writing code, plan your transformations: what goes in, what comes out, and what calculations you need to do.", "where": "Concept step", "instructions": ["Input: JSON with a class name and array of students with Math, Science, English scores.", "For each student: calculate average score, assign letter grade (A/B/C/D/F), determine pass/fail.", "Letter grades: A = 90+, B = 80-89, C = 75-79, D = 60-74, F = below 60.", "Pass = average >= 75, Fail = average below 75.", "Class stats: highest average, lowest average, class average, total passing count."], "code": "// Input format (POST body):\n{\n  \"class\": \"Grade 10 - Magellan\",\n  \"students\": [\n    { \"name\": \"Juan Cruz\",    \"math\": 88, \"science\": 92, \"english\": 85 },\n    { \"name\": \"Maria Santos\", \"math\": 72, \"science\": 68, \"english\": 74 },\n    { \"name\": \"Pedro Reyes\",  \"math\": 55, \"science\": 60, \"english\": 58 }\n  ]\n}\n\n// Expected output per student:\n{ \"name\": \"Juan Cruz\", \"average\": 88.33, \"grade\": \"B\", \"status\": \"PASSED\" }", "codeLang": "Data Design", "result": "You know the input and expected output before writing any DataWeave code."}, {"title": "Build the Grade Calculator", "tag": "DataWeave Math", "tagColor": "#7c3aed", "what": "Write the complete DataWeave that processes all students and calculates grades, averages, and class stats using custom functions.", "where": "File → New → Mule Project → Transform Message", "instructions": ["Create project: <code>grade-tracker-api</code>, Port <code>8088</code>, Path <code>/grades/calculate</code>, Method POST.", "Add Transform Message after HTTP Listener.", "Type the DataWeave below — study the fun keyword for defining custom functions.", "Run and POST the sample body above from Postman.", "Verify each student has the correct letter grade and pass/fail status."], "code": "%dw 2.0\noutput application/json\n---\ndo {\n  // Define a reusable function with the 'fun' keyword:\n  fun letterGrade(avg) =\n    if (avg >= 90)      \"A\"\n    else if (avg >= 80) \"B\"\n    else if (avg >= 75) \"C\"\n    else if (avg >= 60) \"D\"\n    else                \"F\"\n\n  // Process each student using map():\n  var processed = payload.students map (s) -> do {\n    var avg = (s.math + s.science + s.english) / 3.0\n    ---\n    {\n      name:    s.name,\n      scores:  { math: s.math, science: s.science, english: s.english },\n      average: avg,\n      grade:   letterGrade(avg),\n      status:  if (avg >= 75) \"PASSED\" else \"FAILED\"\n    }\n  }\n\n  var averages = processed map (s) -> s.average\n  ---\n  {\n    class:     payload.class,\n    processed: now() as String,\n    students:  processed,\n    classStats: {\n      totalStudents: sizeOf(processed),\n      passing:  sizeOf(processed filter (s) -> s.status == \"PASSED\"),\n      failing:  sizeOf(processed filter (s) -> s.status == \"FAILED\"),\n      highest:  max(averages),\n      lowest:   min(averages),\n      classAvg: (averages reduce (a, acc=0.0) -> acc + a) / sizeOf(averages)\n    }\n  }\n}", "codeLang": "DataWeave with Custom Functions", "tip": "The fun keyword defines a reusable function in DataWeave. Call it like letterGrade(avg). This avoids repeating the same if/else logic for every student.", "result": "API returns all students with calculated grades plus class statistics: highest, lowest, and class average."}]}, {"num": "10", "title": "Connect to a Database", "category": "Anypoint Studio · Database Connector · MySQL", "diff": "intermediate", "time": "3-4 days", "desc": "Connect MuleSoft to a real MySQL database. Read records with SELECT, insert with POST, and use parameterized queries to prevent SQL injection.", "why": "Almost every real API reads from a database. Without this skill your APIs can only return hardcoded data.", "skills": ["Database Connector", "pom.xml dependencies", "MySQL", "SQL SELECT", "SQL INSERT", "Parameterized queries", "config.properties for credentials"], "steps": [{"title": "Add Database Connector Dependency", "tag": "pom.xml", "tagColor": "#1a6cf5", "what": "pom.xml is your project dependency file (like package.json in Node.js). Add the MuleSoft Database Connector and MySQL driver here.", "where": "Package Explorer → your project → pom.xml", "instructions": ["Double-click <b>pom.xml</b> in Package Explorer to open it.", "Find the <code>&lt;dependencies&gt;</code> section.", "Add both dependencies shown below.", "Save with Ctrl+S.", "Right-click project → <b>Maven</b> → <b>Update Project</b> → click OK.", "After update, 'Database' section appears in Mule Palette with Select, Insert, Update, Delete."], "code": "<!-- Add inside <dependencies> in pom.xml -->\n\n<!-- MuleSoft Database Connector -->\n<dependency>\n  <groupId>org.mule.connectors</groupId>\n  <artifactId>mule-db-connector</artifactId>\n  <version>1.14.0</version>\n  <classifier>mule-plugin</classifier>\n</dependency>\n\n<!-- MySQL JDBC Driver -->\n<dependency>\n  <groupId>mysql</groupId>\n  <artifactId>mysql-connector-java</artifactId>\n  <version>8.0.33</version>\n</dependency>", "codeLang": "pom.xml", "tip": "After editing pom.xml, ALWAYS do Maven → Update Project. Skip it and Studio will not find the new connector in the Palette.", "result": "'Database' section with Select, Insert, Update, Delete operations appears in Mule Palette."}, {"title": "Configure DB Connection and Create Test Data", "tag": "DB Config", "tagColor": "#7c3aed", "what": "Create a reusable MySQL connection and set up your test database table.", "where": "MySQL client (run the SQL) then Mule Palette → Database Select → + Connector Config", "instructions": ["Run the SQL below in your MySQL client to create the test table and data.", "Drag <b>Database Select</b> to canvas → click <b>+</b> on Connector Configuration.", "Select <b>MySQL Connection</b> → fill in Host, Port (3306), Database name, User, Password.", "Click <b>Test Connection</b> → must show <b>Successfully Connected</b>.", "Store credentials in <code>config.properties</code>, not hardcoded in XML."], "code": "-- Run in MySQL first:\nCREATE TABLE employees (\n  id INT AUTO_INCREMENT PRIMARY KEY,\n  name VARCHAR(100),\n  department VARCHAR(100),\n  salary DECIMAL(10,2)\n);\n\nINSERT INTO employees (name, department, salary) VALUES\n  ('Juan Cruz',    'Engineering', 45000),\n  ('Maria Santos', 'Design',      40000),\n  ('Pedro Reyes',  'Marketing',   38000);\n\n# config.properties:\ndb.host=localhost\ndb.port=3306\ndb.name=myapp_db\ndb.user=root\ndb.password=yourpassword", "codeLang": "SQL + Properties", "warn": "Test Connection must show 'Successfully Connected' before continuing. If it fails, check MySQL is running and credentials are correct.", "result": "Test Connection passes. Database Config created and reusable across all flows."}, {"title": "Build GET and POST Endpoints", "tag": "CRUD Endpoints", "tagColor": "#059669", "what": "Build the GET /employees endpoint to read all records and POST /employees to insert a new employee.", "where": "Canvas in Anypoint Studio", "instructions": ["<b>GET flow</b>: HTTP Listener (path <code>/employees</code>) → Database Select (<code>SELECT * FROM employees</code>) → Transform Message.", "<b>POST flow</b>: HTTP Listener (path <code>/employees</code>, method POST) → Database Insert → Set Payload (success response).", "For Database Insert, use parameterized SQL with <code>:name</code>, <code>:department</code>, <code>:salary</code>.", "Test GET: <code>GET http://localhost:8089/employees</code>", "Test POST with Postman body: <code>{\"name\": \"Ana Reyes\", \"department\": \"HR\", \"salary\": 35000}</code>"], "code": "// GET - DataWeave after Database Select:\n%dw 2.0\noutput application/json\n---\n{ success: true, count: sizeOf(payload),\n  data: payload map (r) -> {\n    id: r.id, name: r.name,\n    department: r.department, salary: r.salary as Number\n  }\n}\n\n// POST - Database Insert SQL:\nINSERT INTO employees (name, department, salary)\nVALUES (:name, :department, :salary)\n\n// POST Input Parameters mapping:\n{ name: payload.name, department: payload.department, salary: payload.salary }", "codeLang": "SQL + DataWeave", "warn": "ALWAYS use :parameterName in SQL, never string concatenation. SQL injection is a critical security vulnerability.", "result": "GET returns all employees from the database. POST inserts a new employee and confirms success."}]}, {"num": "11", "title": "Public Health Stats API", "category": "Anypoint Studio · disease.sh API · DataWeave", "diff": "intermediate", "time": "2-3 days", "desc": "Call the free disease.sh public health API to get statistics by country. No API key needed. Return summaries with calculated recovery rates and death rates. Teaches nested JSON navigation and DataWeave math.", "why": "Real integrations consume public data APIs. This teaches nested JSON navigation and DataWeave division with real-world data.", "skills": ["No-auth public API", "Nested JSON navigation", "DataWeave division", "Division by zero protection", "Array slicing", "Multiple endpoints in one project"], "steps": [{"title": "Explore the disease.sh API", "tag": "API Exploration", "tagColor": "#1a6cf5", "what": "disease.sh is a free, no-auth public health API. Explore it in your browser first — always understand the data before writing DataWeave.", "where": "Browser — test these URLs", "instructions": ["Test global stats: <code>https://disease.sh/v3/covid-19/all</code>", "Test by country: <code>https://disease.sh/v3/covid-19/countries/Philippines</code>", "Test top countries: <code>https://disease.sh/v3/covid-19/countries?sort=cases</code>", "Study fields: <code>cases, deaths, recovered, active, population, todayCases</code>.", "Note: <code>countryInfo.flag</code> is a URL to the country flag image.", "No API key needed — completely open access!"], "code": "// Country response structure:\n{\n  \"country\": \"Philippines\",\n  \"cases\": 4167890,\n  \"deaths\": 66181,\n  \"recovered\": 4098531,\n  \"active\": 3178,\n  \"population\": 112000000,\n  \"todayCases\": 0,\n  \"countryInfo\": {\n    \"flag\": \"https://disease.sh/assets/img/flags/ph.png\"\n  }\n}\n// No API key needed! Free public access.", "codeLang": "API Response", "tip": "disease.sh is great for practice: no auth, rich data, and lets you practice nested JSON paths like payload.countryInfo.flag.", "result": "Browser shows health statistics JSON for Philippines. You understand all available fields."}, {"title": "Build Health Stats and Top Countries Endpoints", "tag": "Build", "tagColor": "#7c3aed", "what": "Create two endpoints: one for a specific country with calculated rates, and one for the top N countries by case count.", "where": "File → New → Mule Project", "instructions": ["Create project: <code>health-stats-api</code>, Port <code>8090</code>.", "Flow 1: HTTP Listener path <code>/health/{country}</code> → HTTP Request → Transform Message.", "HTTP Request Base URL: <code>https://disease.sh</code>, Path: <code>/v3/covid-19/countries/#[attributes.uriParams.country]</code>.", "Flow 2: HTTP Listener path <code>/health/top</code> → HTTP Request to <code>/v3/covid-19/countries?sort=cases</code> → Transform.", "Test: <code>GET /health/Philippines</code> and <code>GET /health/top?limit=5</code>"], "code": "// Flow 1 - Country stats with calculated rates:\n%dw 2.0\noutput application/json\n---\ndo {\n  var recoveryRate = if (payload.cases > 0)\n    ((payload.recovered / payload.cases) * 100)\n  else 0\n  ---\n  {\n    country:      payload.country,\n    flag:         payload.countryInfo.flag,\n    totalCases:   payload.cases,\n    active:       payload.active,\n    recovered:    payload.recovered,\n    deaths:       payload.deaths,\n    todayCases:   payload.todayCases,\n    recoveryRate: recoveryRate ++ \"%\",\n    fetchedAt:    now() as String\n  }\n}\n\n// Flow 2 - Top N countries:\n%dw 2.0\noutput application/json\n---\ndo {\n  var limit = (attributes.queryParams.limit default \"10\") as Number\n  ---\n  {\n    showing: limit,\n    countries: payload[0 to (limit - 1)] map (c, idx) -> {\n      rank:    idx + 1,\n      country: c.country,\n      cases:   c.cases,\n      deaths:  c.deaths\n    }\n  }\n}", "codeLang": "DataWeave", "tip": "Always check for division by zero before dividing: if (payload.cases > 0) prevents a runtime error when cases is 0. payload[0 to 9] slices the first 10 items of an array.", "result": "GET /health/Philippines returns stats with recovery rate. GET /health/top?limit=5 returns top 5 countries."}]}, {"num": "12", "title": "RAML API Specification", "category": "Anypoint Studio · RAML 1.0 · APIkit", "diff": "intermediate", "time": "3-4 days", "desc": "Design your API contract in RAML before writing any code. Then use APIkit to auto-generate all Mule flows from the spec. This is the professional enterprise MuleSoft workflow.", "why": "RAML-first design is the industry standard in enterprise MuleSoft. Every professional developer knows this.", "skills": ["RAML 1.0", "API-first design", "APIkit Router", "Auto-generated flows", "Schema validation", "Types", "Examples"], "steps": [{"title": "Write the RAML Specification", "tag": "RAML Design", "tagColor": "#1a6cf5", "what": "RAML defines your API contract: endpoints, methods, request/response shapes. You write this BEFORE building the flow — the blueprint comes first.", "where": "src/main/resources → right-click → New File → tasks-api.raml", "instructions": ["Create project: <code>raml-tasks-api</code>.", "In Package Explorer → <b>src/main/resources</b> → right-click → <b>New → File</b>.", "Name: <code>tasks-api.raml</code> → the RAML editor opens.", "Paste the RAML spec below — Studio validates in real time.", "Green checkmark = valid. Red = error in your RAML syntax.", "Study the spec: types define the data shape, responses define what you return."], "code": "#%RAML 1.0\ntitle: Task Manager API\nversion: v1\nbaseUri: http://localhost:8091/api\nmediaType: application/json\n\ntypes:\n  Task:\n    properties:\n      id:       string\n      title:    string\n      done:     boolean\n      priority: string\n\n/tasks:\n  get:\n    description: Get all tasks\n    responses:\n      200:\n        body:\n          application/json:\n            type: Task[]\n  post:\n    description: Create a task\n    body:\n      application/json:\n        type: Task\n    responses:\n      201:\n  /{taskId}:\n    get:\n      responses: { 200: {}, 404: {} }\n    delete:\n      responses: { 204: {} }", "codeLang": "RAML 1.0", "tip": "RAML-first means frontend teams get the spec and can start building before your Mule flows are done. This parallel development saves project time.", "result": "RAML file saved with no errors. Studio shows the API structure in the spec viewer."}, {"title": "Generate Flows with APIkit and Add Logic", "tag": "APIkit", "tagColor": "#7c3aed", "what": "Let APIkit read your RAML and auto-generate all Mule flows. Then add Transform Message to each generated flow with test data.", "where": "Right-click tasks-api.raml in Package Explorer", "instructions": ["Right-click <b>tasks-api.raml</b> → <b>Mule</b> → <b>Generate Flows from Local REST API</b> → OK.", "Studio creates flows automatically: main flow + one per endpoint/method.", "You see: <code>get:\\tasks</code>, <code>post:\\tasks</code>, <code>get:\\tasks\\(taskId)</code>, <code>delete:\\tasks\\(taskId)</code>.", "Click <code>get:\\tasks</code> flow → add Transform Message → return a sample task array.", "Click <code>post:\\tasks</code> flow → add Transform Message → return a 201 created response.", "Run and test — APIkit validates all requests against your RAML automatically!"], "code": "<!-- Auto-generated by APIkit (not written manually): -->\n<flow name=\"api-main\">\n  <http:listener path=\"/api/*\"/>\n  <apikit:router config-ref=\"api-config\"/>\n</flow>\n\n<!-- You only add Transform Message to each: -->\n<flow name=\"get:\\tasks:api-config\">\n  <!-- Add Transform Message with test task array -->\n</flow>\n\n// Test task array DataWeave:\n%dw 2.0\noutput application/json\n---\n[\n  { id: \"1\", title: \"Learn MuleSoft\", done: false, priority: \"high\" },\n  { id: \"2\", title: \"Build an API\",   done: true,  priority: \"medium\" }\n]", "codeLang": "Auto-generated XML + DataWeave", "tip": "APIkit Router automatically returns 404 for unknown paths, 405 for wrong methods, and 400 for invalid request bodies — all based on your RAML spec. Zero extra code needed.", "result": "Multiple flows auto-generated. APIkit handles routing and validation. Add test data to each flow."}]}, {"num": "13", "title": "Salesforce Integration", "category": "Anypoint Studio · Salesforce Connector · SOQL", "diff": "advanced", "time": "4-5 days", "desc": "Connect MuleSoft to Salesforce and query Contacts and Leads using SOQL. The most common enterprise integration pattern and the connector used most in real MuleSoft projects worldwide.", "why": "Salesforce + MuleSoft is the most in-demand skill combo in enterprise integration. This can qualify you for senior MuleSoft roles.", "skills": ["Salesforce Connector", "SOQL queries", "OAuth2 Connected App", "Security Token", "DataWeave SF field mapping", "Test Connection"], "steps": [{"title": "Create Salesforce Dev Account and Connected App", "tag": "Salesforce Setup", "tagColor": "#1a6cf5", "what": "You need a free Salesforce Developer Edition account and a Connected App (like OAuth credentials) for MuleSoft to authenticate with Salesforce.", "where": "Browser → developer.salesforce.com", "instructions": ["Go to <b>developer.salesforce.com</b> → sign up free (no credit card needed).", "After login, click the gear icon → <b>Setup</b> → search <b>App Manager</b> → <b>New Connected App</b>.", "Fill in: Name = MuleSoft Integration. Check <b>Enable OAuth Settings</b>.", "Callback URL: <code>http://localhost</code>. Scopes: Full Access (full).", "Save → wait 10 minutes → click Manage Consumer Details → copy <b>Consumer Key</b> and <b>Consumer Secret</b>.", "Reset Security Token: Setup → Personal → Reset My Security Token (arrives by email)."], "code": "// All 5 values you need:\nUsername:        youremail@salesforce.com\nPassword:        yourpassword\nSecurity Token:  (from email after reset)\nConsumer Key:    (from Connected App)\nConsumer Secret: (from Connected App)\n\n# Add to config.properties:\nsf.username=your@email.com\nsf.password=yourpassword\nsf.token=yourSecurityToken\nsf.key=yourConsumerKey\nsf.secret=yourConsumerSecret", "codeLang": "Salesforce Credentials", "warn": "The Security Token is NOT your password. It is a separate code you reset from: Setup → Personal → Reset My Security Token. It arrives by email within minutes.", "result": "Connected App created. You have all 5 credentials needed for MuleSoft authentication."}, {"title": "Install Connector and Query Contacts", "tag": "Salesforce Query", "tagColor": "#7c3aed", "what": "Add the Salesforce Connector to your project, configure the connection, and write SOQL to retrieve Contacts.", "where": "pom.xml → then Mule Palette → Salesforce Query", "instructions": ["Add Salesforce Connector to pom.xml (see code below).", "Maven → Update Project.", "Drag <b>Salesforce Query</b> to canvas → click <b>+</b> → Username Password → fill in all 5 credentials.", "Click <b>Test Connection</b> → must show <b>Successfully Connected</b>.", "In Query Text field, type the SOQL query below.", "Add Transform Message to map Salesforce fields to clean JSON."], "code": "<!-- pom.xml: -->\n<dependency>\n  <groupId>com.mulesoft.connectors</groupId>\n  <artifactId>mule-salesforce-connector</artifactId>\n  <version>10.18.0</version>\n  <classifier>mule-plugin</classifier>\n</dependency>\n\n// SOQL Query:\nSELECT Id, FirstName, LastName, Email, Phone\nFROM Contact\nWHERE Email != null\nORDER BY LastName ASC\nLIMIT 20\n\n// DataWeave Transform:\n%dw 2.0\noutput application/json\n---\n{\n  total: sizeOf(payload),\n  contacts: payload map (c) -> {\n    id:    c.Id,\n    name:  c.FirstName ++ \" \" ++ c.LastName,\n    email: c.Email,\n    phone: c.Phone default \"N/A\"\n  }\n}", "codeLang": "SOQL + DataWeave", "tip": "SOQL is like SQL but for Salesforce. Key difference: use dot notation for related objects (Account.Name) instead of JOIN. Always write field names exactly as Salesforce defines them (Id not id).", "result": "API returns your Salesforce Contacts as clean JSON. MuleSoft is now integrated with Salesforce!"}]}, {"num": "14", "title": "NOC Alert Analyzer API", "category": "Anypoint Studio · DataWeave Advanced · Scheduler", "diff": "advanced", "time": "5-7 days", "desc": "Accept raw alert TSV/JSON exports, filter noise, group by severity and system, and return structured reports. Add a Scheduler for automatic hourly analysis. Directly applicable to your NOC work.", "why": "Takes your existing AlertAnalysis HTML tool and turns it into a proper deployed API — automatable and shareable with the whole team.", "skills": ["DataWeave filter()", "DataWeave groupBy()", "Scheduler/Cron", "Choice Router", "TSV parsing", "mapObject()", "Object Store"], "steps": [{"title": "Build the Alert Ingest Endpoint", "tag": "POST Ingest", "tagColor": "#1a6cf5", "what": "Create the POST /alerts/analyze endpoint that accepts JSON alert arrays. Use Choice Router to also handle TSV input.", "where": "File → New → Mule Project", "instructions": ["Create project: <code>noc-alert-api</code>, Port <code>8093</code>.", "HTTP Listener: Path <code>/alerts/analyze</code>, Method POST.", "Add a <b>Choice Router</b> after the Listener.", "When condition: <code>#[attributes.headers.'Content-Type' contains 'tab-separated']</code> → TSV parsing branch.", "Default → treat payload as JSON directly.", "Both branches lead to the analysis Transform Message."], "code": "// TSV parsing DataWeave (for tab-separated input):\n%dw 2.0\noutput application/json\n---\ndo {\n  var lines   = payload splitBy \"\\n\"\n  var headers = (lines[0] splitBy \"\\t\") map trim($)\n  var rows    = lines[1 to -1] filter ($ != \"\")\n  ---\n  rows map (line) -> do {\n    var cols = line splitBy \"\\t\"\n    ---\n    headers reduce (h, acc={}) ->\n      acc ++ { (h): cols[$$] }\n  }\n}\n\n// JSON body example:\n{\n  \"alerts\": [\n    { \"system\": \"API-Gateway\", \"severity\": \"CRITICAL\",\n      \"message\": \"5xx spike detected\", \"count\": 42 },\n    { \"system\": \"Deployment\", \"severity\": \"INFO\",\n      \"message\": \"Deployment Failed\" }\n  ]\n}", "codeLang": "TSV + JSON Parsing", "tip": "splitBy splits a string into an array. '\\n' splits by newline (rows), '\\t' splits by tab (columns). Perfect for parsing TSV exports from Outlook.", "result": "POST accepts both JSON and TSV alert payloads."}, {"title": "Apply Noise Filters and Group Alerts", "tag": "DataWeave Advanced", "tagColor": "#7c3aed", "what": "Filter out known noise alerts and use groupBy() to group remaining alerts by severity and system for the summary report.", "where": "Transform Message after the Choice Router", "instructions": ["Add Transform Message after the Choice Router merges.", "Use DataWeave filter() to remove noise alerts (deployments, health checks, INFO level, NON-HA).", "Use groupBy() to group remaining alerts by severity and by system.", "Use mapObject() to count alerts per group.", "Run and POST a sample alert array to test."], "code": "%dw 2.0\noutput application/json\n---\ndo {\n  var allAlerts = payload.alerts\n\n  // Remove known noise:\n  var cleaned = allAlerts\n    filter (a) -> not (a.message contains \"Deployment Failed\")\n    filter (a) -> not ((a.tags default \"\") contains \"NON-HA\")\n    filter (a) -> not (a.message contains \"Health check\")\n    filter (a) -> a.severity != \"INFO\"\n\n  var bySeverity = cleaned groupBy (a) -> a.severity\n  var bySystem   = cleaned groupBy (a) -> a.system\n  ---\n  {\n    summary: {\n      totalReceived: sizeOf(allAlerts),\n      afterFilter:   sizeOf(cleaned),\n      removed:       sizeOf(allAlerts) - sizeOf(cleaned),\n      critical:      sizeOf(bySeverity.CRITICAL default []),\n      warning:       sizeOf(bySeverity.WARNING  default [])\n    },\n    bySystem:  bySystem mapObject (alerts, sys) -> { (sys): sizeOf(alerts) },\n    alerts:    cleaned orderBy (a) -> a.severity,\n    analyzedAt: now() as String\n  }\n}", "codeLang": "DataWeave Filter and GroupBy", "tip": "groupBy() returns an object where each key is a group. mapObject() iterates the keys and values. Together they let you count items per group.", "result": "POST returns filtered alerts grouped by system with CRITICAL/WARNING counts in the summary."}, {"title": "Add Scheduler for Automatic Hourly Analysis", "tag": "Scheduler", "tagColor": "#d97706", "what": "Add a Scheduler that automatically runs the analysis every hour. For testing, use 30 seconds so you can see it fire in the Console.", "where": "Mule Palette → Core → Scheduler → drag to start a new flow", "instructions": ["Create a new flow on the canvas (drag Scheduler to empty area).", "Drag <b>Scheduler</b> to start the new flow.", "Properties: Scheduling Strategy = Cron, Expression = <code>0/30 * * * * ?</code> (every 30s for testing).", "Add HTTP Request to call your own POST /alerts/analyze endpoint.", "Add Logger: <code>#['Auto-analysis done: ' ++ now() as String]</code>", "Run the app — see the logger fire every 30 seconds in Console.", "For production, change cron to <code>0 0 * * * ?</code> (every hour)."], "code": "<!-- Scheduler flow: -->\n<flow name=\"auto-alert-scheduler\">\n  <scheduler>\n    <scheduling-strategy>\n      <!-- every 30 seconds for testing: -->\n      <cron expression=\"0/30 * * * * ?\" timeZone=\"Asia/Manila\"/>\n    </scheduling-strategy>\n  </scheduler>\n  <http:request method=\"POST\"\n    url=\"http://localhost:8093/alerts/analyze\"/>\n  <logger level=\"INFO\"\n    message=\"#['Auto-analysis: ' ++ now() as String]\"/>\n</flow>\n\n// Cron patterns:\n0/30 * * * * ?      every 30 seconds (dev)\n0 0 * * * ?         every hour\n0 0 8 * * MON-FRI   weekdays 8 AM Manila", "codeLang": "Scheduler XML", "tip": "Always set timeZone='Asia/Manila' for Philippine Standard Time. For CloudHub: change cron to hourly before deploying to avoid unnecessary API calls.", "result": "Scheduler fires every 30 seconds. Console shows 'Auto-analysis done' automatically without any manual API call."}]}, {"num": "15", "title": "Full 3-Layer API Architecture", "category": "Anypoint Studio · System API · Process API · Experience API", "diff": "advanced", "time": "7-10 days", "desc": "Build a real enterprise MuleSoft project using the 3-layer architecture: System API (database), Process API (business logic), and Experience API (consumer-facing). The professional standard used in all large enterprise MuleSoft projects.", "why": "API-led connectivity separates beginners from professional MuleSoft developers. This architecture is used in Fortune 500 companies.", "skills": ["API-led Connectivity", "System API", "Process API", "Experience API", "CloudHub multi-app", "HTTP Request between layers", "Anypoint Exchange"], "steps": [{"title": "Understand the 3 Layers", "tag": "Architecture", "tagColor": "#1a6cf5", "what": "Three layers, each with a specific job. Like a restaurant: kitchen prepares food (System), chef coordinates (Process), waiter serves customers (Experience).", "where": "Concept step — critical foundation", "instructions": ["<b>Layer 1 - System API</b>: Talks to databases and external systems only. NO business logic. Just CRUD. Port 8094.", "<b>Layer 2 - Process API</b>: Business logic only. Calls System APIs. NEVER touches DB directly. Port 8095.", "<b>Layer 3 - Experience API</b>: Consumer-facing. Calls Process APIs. Tailored per channel (mobile/web). Port 8096.", "Golden rule: each layer ONLY calls the layer directly below it. Never skip layers.", "Key benefit: if the database changes, you only update the System API. All other layers are unaffected."], "code": "// The 3-layer call chain:\nMobile App\n  -> GET /employees           (Experience API - port 8096)\n    -> GET /process/employees  (Process API   - port 8095)\n      -> GET /api/employees    (System API    - port 8094)\n        -> SELECT * FROM employees  (MySQL)\n\n// Never skip a layer:\n// BAD: Experience API querying MySQL directly\n// BAD: Process API calling Salesforce directly\n//      (should go through a Salesforce System API)\n// GOOD: Always go through the proper layer below you", "codeLang": "Architecture", "result": "You understand all 3 layers, their responsibilities, and the golden rule of never skipping layers."}, {"title": "Build System API (Layer 1)", "tag": "System API", "tagColor": "#059669", "what": "A thin wrapper around the database. Only job: expose database operations as REST endpoints. Zero business logic.", "where": "File → New → Mule Project → employee-system-api", "instructions": ["Create project: <code>employee-system-api</code>, Port <code>8094</code>.", "GET <code>/api/employees</code> → Database Select → Transform (rows to JSON, no business rules!).", "POST <code>/api/employees</code> → Database Insert → return success.", "If you think about adding business logic here: STOP. It belongs in Process API.", "Run and verify both endpoints work correctly."], "code": "// System API - ONLY job is to talk to the database:\n%dw 2.0\noutput application/json\n---\npayload map (row) -> {\n  id:         row.id,\n  name:       row.name,\n  department: row.department,\n  salary:     row.salary as Number,\n  hireDate:   row.hire_date as String\n}\n// NO seniority calculation here!\n// NO salary tier classification!\n// NO filtering by status!\n// JUST pure data from the database.", "codeLang": "System API DataWeave", "tip": "The System API is the single source of truth for a data source. All other layers that need employee data call this. They never query the DB directly.", "result": "System API running on port 8094. Returns raw employee data from the database."}, {"title": "Build Process API (Layer 2)", "tag": "Process API", "tagColor": "#7c3aed", "what": "Add business logic on top of System API data. Calls System API via HTTP Request — never touches the database directly.", "where": "File → New → Mule Project → employee-process-api", "instructions": ["Create project: <code>employee-process-api</code>, Port <code>8095</code>.", "HTTP Listener path: <code>/process/employees</code>.", "Add HTTP Request: URL = <code>http://localhost:8094/api/employees</code> (calls System API!).", "After getting data, add Transform Message with the business logic DataWeave below.", "This layer adds: seniority calculation, salary tier, bonus eligibility — the System API does not have these."], "code": "%dw 2.0\noutput application/json\n---\npayload map (emp) -> do {\n  // Business rule: calculate seniority years\n  var hireYear = emp.hireDate[0 to 3] as Number\n  var thisYear = now().year\n  var years    = thisYear - hireYear\n\n  // Business rule: classify salary tier\n  var tier = if (emp.salary >= 50000)      \"Senior\"\n             else if (emp.salary >= 35000) \"Mid\"\n             else                          \"Junior\"\n  ---\n  {\n    id:             emp.id,\n    name:           emp.name,\n    department:     emp.department,\n    salaryTier:     tier,\n    seniorityYears: years,\n    bonusEligible:  years > 2 and tier != \"Junior\"\n  }\n}", "codeLang": "Process API DataWeave", "warn": "Notice: this API calls http://localhost:8094 (System API) via HTTP Request. NEVER add a Database connector here — that would bypass the System API layer.", "result": "Process API on port 8095 returns enriched data with salary tiers, seniority years, and bonus eligibility."}, {"title": "Build Experience API and Deploy All 3", "tag": "Experience + Deploy", "tagColor": "#d97706", "what": "Build the mobile-optimized Experience API, then deploy all 3 projects to CloudHub in the correct order.", "where": "File → New → Mule Project → employee-experience-api", "instructions": ["Create project: <code>employee-experience-api</code>, Port <code>8096</code>.", "HTTP Request → calls Process API at <code>http://localhost:8095/process/employees</code>.", "Transform Message: return only mobile-needed fields (compact, no sensitive data).", "<b>Deploy System API first</b> → copy its CloudHub URL.", "<b>Deploy Process API</b> → update HTTP Request URL to System API CloudHub URL.", "<b>Deploy Experience API</b> → update HTTP Request URL to Process API CloudHub URL.", "Test: call Experience API CloudHub URL — it flows through all 3 layers automatically!"], "code": "// Experience API - mobile-optimized response:\n%dw 2.0\noutput application/json\n---\n{\n  total: sizeOf(payload),\n  employees: payload map (e) -> {\n    id:       e.id,\n    name:     e.name,\n    tier:     e.salaryTier,\n    seniority: e.seniorityYears\n    // Omit: raw salary (sensitive), full hireDate\n  }\n}\n\n// CloudHub URLs (deploy in this order):\n// 1. employee-system-api-kobi.cloudhub.io   (internal only)\n// 2. employee-process-api-kobi.cloudhub.io  (internal only)\n// 3. employee-experience-api-kobi.cloudhub.io (PUBLIC - share this one)\n\n// Only the Experience API URL is shared externally!", "codeLang": "Experience API + CloudHub", "tip": "On CloudHub, System and Process APIs should be internal. Only Experience API should be public. Add API key or JWT policy to the Experience API for production security.", "result": "All 3 APIs live on CloudHub! One call to Experience API flows through all 3 layers. You have built enterprise-grade MuleSoft! Congratulations!"}]}];

let filter='all', current=0;
const done = new Set();

function getVisible(){
  return PROJECTS.map((p,i)=>filter==='all'||p.diff===filter?i:-1).filter(i=>i>=0);
}
function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const v=getVisible();
  if(!v.includes(current)) current=v[0]??0;
  renderSidebar(); renderMain();
}
function selectProject(i){
  current=i;
  renderSidebar(); renderMain();
  document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});
}
function navigate(d){
  const v=getVisible(), i=v.indexOf(current)+d;
  if(i>=0&&i<v.length){current=v[i];renderSidebar();renderMain();document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});}
}
function toggleStep(el){
  const body=el.nextElementSibling;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  el.classList.toggle('open',!isOpen);
  el.closest('.step-box').classList.toggle('open-box',!isOpen);
}
function toggleDone(circle){
  var key=circle.dataset.key;
  if(done.has(key)){done.delete(key);circle.classList.remove('done');circle.textContent=circle.dataset.n;}
  else{done.add(key);circle.classList.add('done');circle.textContent='\u2713';}
  updateStatus();
}
function updateStatus(){
  const v=getVisible();
  const total=v.reduce((s,i)=>s+PROJECTS[i].steps.length,0);
  const d=[...done].filter(k=>v.some(i=>k.startsWith(i+'-'))).length;
  document.getElementById('doneCount').textContent=d+' / '+total+' steps done';
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pillStyle(d){
  return d==='beginner'?'background:#dcfce7;color:#166534':d==='intermediate'?'background:#ffedd5;color:#9a3412':'background:#fee2e2;color:#991b1b';
}
function htagStyle(d){
  return d==='beginner'?'color:#16a34a;border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.08)':d==='intermediate'?'color:#ea580c;border-color:rgba(234,88,12,.4);background:rgba(234,88,12,.08)':'color:#dc2626;border-color:rgba(220,38,38,.4);background:rgba(220,38,38,.08)';
}
function diffLabel(d){return {beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced'}[d]||d;}

function renderSidebar(){
  const v=getVisible();
  document.getElementById('sidebar').innerHTML=PROJECTS.map((p,i)=>{
    const hidden=!v.includes(i), active=i===current;
    const dc=[...done].filter(k=>k.startsWith(i+'-')).length;
    return '<div class="nav-item '+(active?'active':'')+' '+(hidden?'hidden':'')+'" onclick="selectProject('+i+')">'
      +'<div class="nav-num">'+p.num+'</div>'
      +'<div class="nav-info">'
      +'<div class="nav-title">'+p.title+'</div>'
      +'<span class="nav-pill" style="'+pillStyle(p.diff)+'">'+diffLabel(p.diff)+'</span>'
      +(dc>0?'<span style="font-size:10px;color:#16a34a;font-family:var(--mono);margin-left:6px;">&#x2713; '+dc+'/'+p.steps.length+'</span>':'')
      +'</div></div>';
  }).join('');
}

function renderMain(){
  const v=getVisible();
  if(!v.length){document.getElementById('main').innerHTML='<div class="empty">No projects match this filter.</div>';return;}
  if(!v.includes(current)) current=v[0];
  const p=PROJECTS[current];
  const visIdx=v.indexOf(current);
  const hasPrev=visIdx>0, hasNext=visIdx<v.length-1;
  const donePct=Math.round(([...done].filter(k=>k.startsWith(current+'-')).length/p.steps.length)*100);

  const stepsHtml=p.steps.map((s,si)=>{
    const key=current+'-'+si, isDone=done.has(key);
    let extra='';
    if(s.warn) extra='<div class="warn-block"><span class="block-icon">&#x26A0;&#xFE0F;</span><span>'+s.warn+'</span></div>';
    else if(s.tip) extra='<div class="tip-block"><span class="block-icon">&#x1F4A1;</span><span>'+s.tip+'</span></div>';
    const resultHtml=s.result?'<div class="result-block"><div><div class="rb-label">&#x2705; Expected Result</div><div class="rb-text">'+s.result+'</div></div></div>':'';
    const whereHtml=s.where?'<div class="where-block"><span style="font-size:13px">&#x1F4CD;</span><span>'+s.where+'</span></div>':'';
    const instrHtml=s.instructions.map((ins,ii)=>'<li class="instr-item"><span class="instr-badge">'+(ii+1)+'</span><span class="instr-text">'+ins+'</span></li>').join('');
    return '<div class="step">'
      +'<div class="step-left"><div class="step-num '+(isDone?'done':'')+'" data-n="'+(si+1)+'" data-key="'+key+'" onclick="this.dataset.key&&toggleDone(this)" title="Click to mark done">'+(isDone?'&#x2713;':(si+1))+'</div></div>'
      +'<div class="step-box '+(isDone?'open-box':'')+'">'
        +'<div class="step-head" onclick="toggleStep(this)">'
          +'<span class="s-num">STEP '+(si+1)+'</span>'
          +'<span class="s-title">'+s.title+'</span>'
          +'<span class="s-tag" style="background:'+s.tagColor+'18;color:'+s.tagColor+';border:1.5px solid '+s.tagColor+'33">'+s.tag+'</span>'
          +'<span class="s-arrow">&#x25BC;</span>'
        +'</div>'
        +'<div class="step-body">'
          +'<div class="what-block"><span class="what-icon">&#x1F4D6;</span><div><div class="what-label">What you will do</div><div class="what-text">'+s.what+'</div></div></div>'
          +'<div class="instr-block"><div class="instr-title">Step-by-Step Instructions</div><ul class="instr-list">'+instrHtml+'</ul>'+whereHtml+'</div>'
          +'<div class="code-wrap"><div class="code-bar"><div class="code-dots"><div class="cdot" style="background:#ff5f56"></div><div class="cdot" style="background:#ffbd2e"></div><div class="cdot" style="background:#27c93f"></div></div><span class="code-lang">'+s.codeLang+'</span></div><div class="code-body">'+esc(s.code)+'</div></div>'
          +extra+resultHtml
        +'</div>'
      +'</div></div>';
  }).join('');

  document.getElementById('main').innerHTML=
    '<div class="hero"><div class="hero-row"><div class="hero-left"><div class="hero-num">'+p.num+'</div><div><div class="hero-title">'+p.title+'</div><div class="hero-cat">'+p.category+'</div></div></div><div class="hero-tags"><span class="htag" style="'+htagStyle(p.diff)+'">'+diffLabel(p.diff)+'</span><span class="timetag">&#x23F1; '+p.time+'</span><span class="timetag">'+p.steps.length+' Steps</span></div></div><div class="hero-desc">'+p.desc+'</div></div>'
    +'<div class="begin-banner"><span class="bb-icon">&#x1F393;</span><div><div class="bb-title">How to use this guide</div><div class="bb-text">Click each step to expand it. Read <b>"What you will do"</b> first, then follow the numbered instructions one by one. Click the <b>circle number</b> on the left to mark a step as done. Work through steps in order — each one builds on the previous.</div></div></div>'
    +'<div class="steps-wrap"><div class="steps-header"><span class="sh-label">Implementation Steps</span><div class="sh-line"></div><span class="sh-count">'+p.steps.length+' steps &middot; click circle to mark done</span></div>'+stepsHtml+'</div>'
    +'<div class="skills-wrap"><div class="sk-label">Skills You Will Learn</div><div class="sk-chips">'+p.skills.map(s=>'<span class="sk-chip">'+s+'</span>').join('')+'</div></div>'
    +'<div class="bnav"><button class="bnav-btn bp" onclick="navigate(-1)" '+(hasPrev?'':'disabled')+'>&larr; Previous</button><div class="bnav-mid"><div class="bnav-name">'+p.title+'</div><div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:'+donePct+'%"></div></div><div style="font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono)">'+donePct+'% complete &middot; '+(visIdx+1)+' / '+v.length+' projects</div></div><button class="bnav-btn bn" onclick="navigate(1)" '+(hasNext?'':'disabled')+'>Next &rarr;</button></div>';

  updateStatus();
}

renderSidebar();
renderMain();
</script>
</body>
